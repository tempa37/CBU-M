async function get_info() {
	try {
		await fetch('/info.json')
		.then(response => response.json())
		.then(function(json) {
			for (let keys of Object.keys(json)) {
				if (keys == "sen2max" || keys == "sen2min") {
				let res = parseFloat(json[keys]) / 100;
					document.getElementById(keys).value = res.toFixed(1);
				} else if (keys == "sen1s" || keys == "sen2s" ||  keys == "urm" || keys == "umvh") {
					switch(parseInt(json[keys]))
					{
						case 1 : {
							document.getElementById(keys).value = "OFFLINE";
							break;
						}
						case 2 : {
							document.getElementById(keys).value = "ONLINE";
							break;
						}
						case 4 : {
							document.getElementById(keys).value = "Ниже MIN порога";
							break;
						}
						case 5 : {
							document.getElementById(keys).value = "НОРМА";
							break;
						}
						case 6 : {
							document.getElementById(keys).value = "Выше MAX порога";
							break;
						}
						default :
							break;
					}
				} else {
					document.getElementById(keys).value = json[keys];
				}
			}
			setTimeout(() => { get_info(); }, 1000);
		});
	} catch (error) {
		console.log("Возникла проблема с запросом: ", error.name);
		setTimeout(() => { get_info(); }, 1000);
	}
}

window.onload = function() {
	get_info();
}
