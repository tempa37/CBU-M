<script>

function initPinStateToggle() {
	let pinsToggle = document.getElementById("pins-toggle");
	let pinsContent = document.getElementById("pins-content");
	if (pinsToggle != null && pinsContent != null) {
		pinsToggle.addEventListener("click", function() {
			pinsContent.classList.toggle("hide");
			pinsToggle.innerHTML = pinsContent.classList.contains("hide") ? "Развернуть" : "Свернуть";
		});
	}
}

async function up() {
	let count = 4;
	for (let n = 1; n <= count; n++) {
		let sel_button = document.getElementById(`button${n}`);
		if (sel_button != null) {
			document.getElementById(`button${n}`).addEventListener("click", function() {
				let sel_frame = document.getElementById(`group${n}`);
				sel_frame.classList.toggle("hide");
				sel_button.innerHTML == "Спрятать" ? sel_button.innerHTML = "Показать" : sel_button.innerHTML = "Спрятать";
			});
			document.getElementById(`frame${n}`).style.display = "block";
			let p = document.querySelector(`#group${n}`);
			p.className = "hide";
		}
	}
}
up();
initPinStateToggle();
window.onload = function() {
	State1();
	let uartBtn = document.getElementById("uart-test-btn");
	if (uartBtn != null) {
		uartBtn.addEventListener("click", StartUartTest);
	}
}
</script>
