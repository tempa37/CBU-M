<!DOCTYPE html>
<html lang="ru">
<head>
<link rel="icon" href="data:;base64,iVBORw0KGgo=">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тесты</title>
<style type="text/css">
body, button {
font-family: Georgia, Times, Times New Roman, sans-serif;
font-size: 15px;
color: #1F2833;
}
.container {
width: 640px;
}
.elem0 {
display: flex;
justify-content: space-between;
align-items: center;
width: 100%;
margin-bottom: 5px;
padding: 6px 0;
background-color: #dff2ef;
}
.left_col {
width: 60%;
padding-left: 8px;
}
.right_col {
width: 40%;
text-align: center;
}
button {
width: 150px;
}
.hide {
display: none;
}
.pin-state {
padding: 8px;
border: 1px solid #dff2ef;
margin-bottom: 8px;
}
</style>
</head>
<body>
<div class="container">
<hr/>
<div class="elem0">
<div class="left_col">Тест EEPROM</div>
<div class="right_col"><button type="button">Проверить связь</button></div>
</div>

<div class="elem0">
<div class="left_col">Тест клавиатуры</div>
<div class="right_col"><button type="button">Запустить</button></div>
</div>

<div class="elem0">
<div class="left_col">Тест watchdog</div>
<div class="right_col"><button type="button">Запустить</button></div>
</div>

<div class="elem0">
<div class="left_col">Тест UART</div>
<div class="right_col"><button type="button">Запустить</button></div>
</div>

<div class="elem0">
<div class="left_col">Состояние пинов</div>
<div class="right_col"><button id="pins-toggle" type="button">Развернуть</button></div>
</div>
<div id="pins-content" class="pin-state hide">
<div>PIN 1: -</div>
<div>PIN 2: -</div>
<div>PIN 3: -</div>
<div>PIN 4: -</div>
</div>
<hr/>
</div>

<script>
const pinsToggle = document.getElementById('pins-toggle');
const pinsContent = document.getElementById('pins-content');

pinsToggle.addEventListener('click', function() {
  pinsContent.classList.toggle('hide');
  pinsToggle.textContent = pinsContent.classList.contains('hide') ? 'Развернуть' : 'Свернуть';
});
</script>
</body>
</html>
