<!DOCTYPE html>
<html lang="ru">
<head>
<link rel="icon" href="data:;base64,iVBORw0KGgo=">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keyboard Panel</title>
<style type="text/css">
:root {
  --panel-bg: #ebeef0;
  --panel-edge: #c4c9cc;
  --steel-light: #f7f9fb;
  --steel-mid: #bdc6cd;
  --steel-dark: #89929a;
  --text-main: #6d757c;
  --ring-cyan: #2ef2d3;
  --ring-green: #1ed985;
  --ring-red: #f3a2a2;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  padding: 18px;
  font-family: "Trebuchet MS", "Segoe UI", sans-serif;
  color: var(--text-main);
  background: linear-gradient(180deg, #d4d8dc 0%, #c3c8cc 100%);
}

.panel {
  position: relative;
  width: min(760px, 100%);
  margin: 0 auto;
  padding: 22px 26px 30px;
  border: 3px solid var(--panel-edge);
  border-radius: 16px;
  background:
    radial-gradient(circle at 14% 20%, rgba(255, 255, 255, 0.55) 0, transparent 22%),
    radial-gradient(circle at 86% 66%, rgba(201, 208, 214, 0.44) 0, transparent 27%),
    var(--panel-bg);
  box-shadow:
    inset 0 0 0 1px #f6f8f9,
    0 12px 26px rgba(64, 71, 77, 0.22);
}

.screw {
  position: absolute;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  border: 1px solid #8d949a;
  background: radial-gradient(circle at 35% 35%, #f4f6f8 0%, #a4acb3 70%, #7d868e 100%);
  box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.55);
}

.screw::before,
.screw::after {
  content: "";
  position: absolute;
  top: 50%;
  left: 50%;
  background: rgba(95, 104, 113, 0.7);
  transform: translate(-50%, -50%);
}

.screw::before {
  width: 10px;
  height: 2px;
}

.screw::after {
  width: 2px;
  height: 10px;
}

.screw.tl { top: 10px; left: 10px; }
.screw.tr { top: 10px; right: 10px; }
.screw.bl { bottom: 10px; left: 10px; }
.screw.br { bottom: 10px; right: 10px; }

.top-layout {
  display: grid;
  grid-template-columns: 180px 1fr;
  gap: 28px;
  align-items: start;
  margin-bottom: 34px;
}

.display {
  width: 140px;
  height: 120px;
  margin: 14px auto 0;
  border: 5px solid #22282c;
  border-radius: 5px;
  background: #0f1215;
  box-shadow: inset 0 0 18px rgba(0, 0, 0, 0.9);
  color: #a6b8ca;
  font-family: "Consolas", "Courier New", monospace;
  font-size: 10px;
  line-height: 1.35;
  padding: 10px;
  letter-spacing: 0.3px;
}

.display .line {
  opacity: 0.75;
}

.nav-wrap {
  padding-top: 2px;
}

.nav-grid {
  display: grid;
  grid-template-columns: repeat(3, 84px);
  gap: 14px 20px;
  justify-content: start;
}

button {
  border: none;
  padding: 0;
  font: inherit;
  cursor: pointer;
  background: none;
}

.key {
  position: relative;
  display: grid;
  place-items: center;
  border-radius: 50%;
  color: #3e464d;
  background: radial-gradient(circle at 35% 32%, var(--steel-light) 0%, var(--steel-mid) 58%, var(--steel-dark) 100%);
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.95),
    inset 0 -2px 2px rgba(49, 56, 61, 0.45),
    0 5px 8px rgba(38, 44, 49, 0.25);
}

.key::before {
  content: "";
  position: absolute;
  inset: 12px;
  border-radius: 50%;
  border: 6px solid var(--ring-color, var(--ring-cyan));
  box-shadow:
    0 0 8px rgba(46, 242, 211, 0.75),
    inset 0 0 4px rgba(255, 255, 255, 0.6);
}

.key::after {
  content: "";
  position: absolute;
  inset: 24px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, #fefefe 0%, #d9e0e6 60%, #9ea8b0 100%);
  box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.9);
}

.key > span {
  position: relative;
  z-index: 1;
  font-weight: 700;
  font-size: 22px;
  text-shadow: 0 1px 1px rgba(255, 255, 255, 0.7);
}

.key-small {
  width: 72px;
  height: 72px;
}

.key-neutral {
  --ring-color: #c7ced5;
}

.key-red-ring {
  --ring-color: var(--ring-red);
}

.key-large {
  width: 116px;
  height: 116px;
}

.key-green-ring {
  --ring-color: var(--ring-green);
}

.nav-captions {
  margin-top: 10px;
  display: grid;
  grid-template-columns: repeat(3, 84px);
  gap: 20px;
  text-transform: uppercase;
  justify-content: start;
  font-size: 24px;
  letter-spacing: 0.8px;
}

.nav-captions span {
  text-align: center;
}

.nav-captions .caption-cancel {
  font-size: 20px;
  letter-spacing: 0.4px;
}

.bottom-layout {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
  align-items: end;
}

.control {
  text-align: center;
}

.control-label {
  margin: 0 0 10px;
  font-size: 14px;
  letter-spacing: 1.1px;
  text-transform: uppercase;
  color: #707980;
}

.label-hand {
  font-family: "Segoe Print", "Comic Sans MS", cursive;
  font-weight: 700;
  font-size: 13px;
  line-height: 1.25;
  letter-spacing: 0.8px;
}

.emergency-wrap {
  position: relative;
  width: 194px;
  height: 194px;
  margin: 0 auto;
  display: grid;
  place-items: center;
}

.emergency-top,
.emergency-bottom {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  text-transform: uppercase;
  letter-spacing: 2.1px;
  font-size: 17px;
  color: #8a9095;
  white-space: nowrap;
}

.emergency-top {
  top: -5px;
}

.emergency-bottom {
  bottom: -7px;
}

.key-emergency {
  width: 150px;
  height: 150px;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 28%, #ffb7a9 0%, #f06f5d 36%, #d84d3d 66%, #b6382b 100%);
  box-shadow:
    inset 0 5px 10px rgba(255, 223, 215, 0.52),
    inset 0 -9px 12px rgba(132, 35, 27, 0.42),
    0 10px 16px rgba(96, 42, 37, 0.27);
}

.key-emergency::before {
  content: "";
  position: absolute;
  inset: 16px;
  border-radius: 50%;
  border: 2px solid rgba(255, 214, 205, 0.34);
}

.key-emergency::after {
  content: "";
  position: absolute;
  inset: 34px;
  border-radius: 50%;
  border: 2px solid rgba(255, 171, 157, 0.55);
}

@media (max-width: 720px) {
  body {
    padding: 10px;
  }

  .panel {
    padding: 18px 14px 24px;
  }

  .top-layout {
    grid-template-columns: 1fr;
    gap: 20px;
    margin-bottom: 30px;
  }

  .nav-wrap {
    margin: 0 auto;
  }

  .bottom-layout {
    grid-template-columns: 1fr 1fr;
    gap: 20px 14px;
  }

  .control.emergency {
    grid-column: 1 / -1;
  }
}

@media (max-width: 500px) {
  .nav-grid {
    grid-template-columns: repeat(3, 72px);
    gap: 10px 12px;
  }

  .nav-captions {
    grid-template-columns: repeat(3, 72px);
    gap: 12px;
    font-size: 20px;
  }

  .nav-captions .caption-cancel {
    font-size: 17px;
  }

  .key-small {
    width: 64px;
    height: 64px;
  }

  .key-large {
    width: 102px;
    height: 102px;
  }

  .emergency-wrap {
    width: 170px;
    height: 170px;
  }

  .key-emergency {
    width: 132px;
    height: 132px;
  }
}
</style>
</head>
<body>
<main class="panel">
  <span class="screw tl"></span>
  <span class="screw tr"></span>
  <span class="screw bl"></span>
  <span class="screw br"></span>

  <section class="top-layout">
    <div class="display" aria-label="Display Mockup">
      <div class="line">ID 0001</div>
      <div class="line">MODE AUTO</div>
      <div class="line">LINE OK</div>
      <div class="line">PRESS 1.2</div>
      <div class="line">12:00:00</div>
    </div>

    <div class="nav-wrap">
      <div class="nav-grid">
        <button class="key key-small" type="button" aria-label="Left">
          <span>&#9664;</span>
        </button>
        <button class="key key-small" type="button" aria-label="Up">
          <span>&#9650;</span>
        </button>
        <button class="key key-small" type="button" aria-label="Right">
          <span>&#9654;</span>
        </button>
        <button class="key key-small key-neutral" type="button" aria-label="Enter">
          <span>&#9679;</span>
        </button>
        <button class="key key-small" type="button" aria-label="Down">
          <span>&#9660;</span>
        </button>
        <button class="key key-small key-neutral" type="button" aria-label="Cancel">
          <span>&#10005;</span>
        </button>
      </div>

      <div class="nav-captions" aria-hidden="true">
        <span>&#1042;&#1042;&#1054;&#1044;</span>
        <span>&#1052;&#1045;&#1053;&#1070;</span>
        <span class="caption-cancel">&#1054;&#1058;&#1052;&#1045;&#1053;&#1048;&#1058;&#1068;</span>
      </div>
    </div>
  </section>

  <section class="bottom-layout">
    <div class="control">
      <p class="control-label label-hand">&#1059;&#1042;&#1045;&#1051;&#1048;&#1063;&#1048;&#1058;&#1068;<br>&#1044;&#1040;&#1042;&#1051;&#1045;&#1053;&#1048;&#1045;</p>
      <button class="key key-large key-green-ring" type="button" aria-label="Increase pressure"></button>
    </div>

    <div class="control">
      <p class="control-label label-hand">&#1059;&#1052;&#1045;&#1053;&#1068;&#1064;&#1048;&#1058;&#1068;<br>&#1044;&#1040;&#1042;&#1051;&#1045;&#1053;&#1048;&#1045;</p>
      <button class="key key-large key-red-ring" type="button" aria-label="Decrease pressure"></button>
    </div>

    <div class="control emergency">
      <div class="emergency-wrap">
        <div class="emergency-top">&#1040;&#1042;&#1040;&#1056;&#1048;&#1049;&#1053;&#1067;&#1049;</div>
        <button class="key-emergency" type="button" aria-label="Emergency reset"></button>
        <div class="emergency-bottom">&#1057;&#1041;&#1056;&#1054;&#1057;</div>
      </div>
    </div>
  </section>
</main>
</body>
</html>
