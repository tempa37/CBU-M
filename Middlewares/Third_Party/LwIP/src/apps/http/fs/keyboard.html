<!DOCTYPE html>
<html lang="ru">
<head>
<link rel="icon" href="data:;base64,iVBORw0KGgo=">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тест клавиатуры</title>
<style>
body { width:1280px; margin:auto; font-family: Arial, sans-serif; }
.panel {
  position: relative;
  width: 1200px;
  height: 700px;
  margin: 20px auto;
  background: #efefef;
  border-radius: 10px;
}
.key {
  position: absolute;
  width: 102px;
  height: 102px;
  border-radius: 50%;
  border: 2px solid #bdbdbd;
  background: #d0d0d0;
  color: #202020;
  font-size: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  user-select: none;
  touch-action: none;
  transition: background-color .08s ease, border-color .08s ease;
}
.key.large { width: 170px; height: 170px; }
.key.active { background: #42b15d; border-color: #2f8d45; color: #fff; }
.key.pressed-history { background: #dff1ff; border-color: #9ec8ea; }
.key.active.pressed-history { background: #42b15d; border-color: #2f8d45; color: #fff; }
.topbar { display:flex; justify-content:space-between; align-items:center; margin: 18px 40px 0; }
button { padding: 8px 14px; font-size: 16px; cursor: pointer; }
.status { font-family: monospace; }
.key-title {
  position: absolute;
  width: 140px;
  text-align: center;
  font-size: 20px;
  color: #303030;
  font-weight: 600;
  user-select: none;
}
</style>
</head>
<body>
<div class="topbar">
  <button type="button" onclick="location.href='test.html'">&larr; Назад</button>
  <h2>Тест клавиатуры</h2>
  <div class="status" id="status">mask: ----</div>
</div>

<div class="panel" id="keyboard_panel">
  <div class="key" id="k_left" style="left:455px; top:38px;">&#9664;</div>
  <div class="key" id="k_up" style="left:560px; top:38px;">&#9650;</div>
  <div class="key" id="k_right" style="left:665px; top:38px;">&#9654;</div>

  <div class="key" id="k_apply" style="left:455px; top:168px;">&#10003;</div>
  <div class="key-title" style="left:436px; top:278px;">ПРИМЕНИТЬ</div>

  <div class="key-title" style="left:541px; top:128px;">МЕНЮ</div>
  <div class="key" id="k_down" style="left:560px; top:168px;">&#9660;</div>

  <div class="key" id="k_cancel" style="left:665px; top:168px;">&#10005;</div>
  <div class="key-title" style="left:646px; top:278px;">ОТМЕНИТЬ</div>

  <div class="key-title" style="left:70px; top:390px; width:160px;">УВЕЛИЧИТЬ ДАВЛЕНИЕ</div>
  <div class="key" id="k_inc" style="left:90px; top:430px;"></div>

  <div class="key-title" style="left:280px; top:390px; width:160px;">УМЕНЬШИТЬ ДАВЛЕНИЕ</div>
  <div class="key" id="k_dec" style="left:300px; top:430px;"></div>

  <div class="key-title" style="left:805px; top:360px;">АВАРИЙНЫЙ</div>
  <div class="key large" id="k_emergency" style="left:800px; top:400px;">STOP</div>
</div>

<script>
const KEY_BINDINGS = [
  { bit: 0, id: 'k_right' },
  { bit: 1, id: 'k_up' },
  { bit: 2, id: 'k_down' },
  { bit: 3, id: 'k_left' },
  { bit: 4, id: 'k_cancel' },
  { bit: 9, id: 'k_inc' },
  { bit: 11, id: 'k_dec' },
  { bit: 12, id: 'k_apply' },
  { bit: 13, id: 'k_emergency' }
];

const STM_KEY_NAMES = {
  0: 'key_right',
  1: 'key_up',
  2: 'key_down',
  3: 'key_left',
  4: 'key_cancel',
  9: 'key_increase',
  11: 'key_decrease',
  12: 'key_apply',
  13: 'key_emergency_stop'
};

const keysByBit = new Map(
  KEY_BINDINGS.map((binding) => [binding.bit, document.getElementById(binding.id)])
);

const statusEl = document.getElementById('status');
const pressedHistoryBits = new Set();
let hwMask = 0;
let manualMask = 0;
let pollInFlight = false;
let pollTimer = null;

function logPressedKeys(previousMask, mask) {
  const pressedMask = mask & (~previousMask);
  if (pressedMask === 0) {
    return;
  }

  for (let bit = 0; bit < 16; bit++) {
    if (((pressedMask >> bit) & 1) === 1) {
      pressedHistoryBits.add(bit);
      const keyName = STM_KEY_NAMES[bit] || `bit_${bit}`;
      console.log(`[STM] key pressed: ${keyName} (bit ${bit})`);
    }
  }
}

function renderMask(mask) {
  for (const [bit, el] of keysByBit) {
    if (!el) continue;
    const active = ((mask >> bit) & 1) === 1;
    el.classList.toggle('active', active);
    el.classList.toggle('pressed-history', pressedHistoryBits.has(bit));
  }

  statusEl.textContent = `mask: ${mask.toString(16).toUpperCase().padStart(4, '0')}`;
}

function renderCurrentMask() {
  renderMask(hwMask | manualMask);
}

function bindLocalInteraction() {
  for (const [bit, el] of keysByBit) {
    if (!el) continue;

    const release = () => {
      manualMask &= ~(1 << bit);
      renderCurrentMask();
    };

    el.addEventListener('pointerdown', (event) => {
      event.preventDefault();
      pressedHistoryBits.add(bit);
      manualMask |= (1 << bit);
      if (el.setPointerCapture) {
        el.setPointerCapture(event.pointerId);
      }
      renderCurrentMask();
    });

    el.addEventListener('pointerup', release);
    el.addEventListener('pointercancel', release);
    el.addEventListener('lostpointercapture', release);
  }
}

async function pollKeyboardState() {
  if (pollInFlight) {
    return;
  }

  pollInFlight = true;
  try {
    const response = await fetch('/keyboard_state.json', { cache: 'no-store' });
    const json = await response.json();
    const mask = parseInt(json.m, 16);
    if (!Number.isNaN(mask) && mask !== hwMask) {
      logPressedKeys(hwMask, mask);
      hwMask = mask;
      renderCurrentMask();
    }
  } catch (error) {
    console.log('keyboard state request error:', error.name);
  } finally {
    pollInFlight = false;
    pollTimer = setTimeout(pollKeyboardState, 300);
  }
}

bindLocalInteraction();
renderCurrentMask();
pollKeyboardState();
</script>
</body>
</html>
