<!DOCTYPE html>
<html lang="ru">
<head>
<link rel="icon" href="data:;base64,iVBORw0KGgo=">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>&#1058;&#1077;&#1089;&#1090; &#1082;&#1083;&#1072;&#1074;&#1080;&#1072;&#1090;&#1091;&#1088;&#1099;</title>
<style>
body { width:1280px; margin:auto; font-family: Arial, sans-serif; }
.panel {
  position: relative;
  width: 1200px;
  height: 700px;
  margin: 20px auto;
  background: #efefef;
  border-radius: 10px;
}
.keyboard-content {
  position: relative;
  width: 820px;
  height: 620px;
  margin: 40px auto 0;
}
.key {
  position: absolute;
  width: 102px;
  height: 102px;
  border-radius: 50%;
  border: 2px solid #bdbdbd;
  background: #d0d0d0;
  color: #202020;
  font-size: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  user-select: none;
  touch-action: none;
  transition: background-color .08s ease, border-color .08s ease;
}
.key.large { width: 170px; height: 170px; }
.key.active { background: #42b15d; border-color: #2f8d45; color: #fff; }
.key.pressed-history { background: #dff1ff; border-color: #9ec8ea; }
.key.active.pressed-history { background: #42b15d; border-color: #2f8d45; color: #fff; }
.topbar { display:flex; justify-content:space-between; align-items:center; margin: 18px 40px 0; }
button { padding: 8px 14px; font-size: 16px; cursor: pointer; }
.status { font-family: monospace; }
.key-title {
  position: absolute;
  width: 170px;
  text-align: center;
  font-size: 20px;
  color: #202020;
  font-weight: 600;
  user-select: none;
}
.screen-placeholder {
  position: absolute;
  left: 110px;
  top: 70px;
  width: 150px;
  height: 150px;
  background: #f8f8f8;
  border: 1px solid #111;
  box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
}
@media (max-width: 1200px) {
  .panel { transform: scale(0.75); transform-origin: top left; height: 560px; }
}
</style>
</head>
<body>
<div class="topbar">
  <button type="button" onclick="location.href='test.html'">&larr; &#1053;&#1072;&#1079;&#1072;&#1076;</button>
  <h2>&#1058;&#1077;&#1089;&#1090; &#1082;&#1083;&#1072;&#1074;&#1080;&#1072;&#1090;&#1091;&#1088;&#1099;</h2>
  <div class="status" id="status">mask: ----</div>
</div>

<div class="panel" id="keyboard_panel">
  <div class="keyboard-content">
    <div class="screen-placeholder"></div>

    <div class="key" id="k_left" style="left:330px; top:48px;">&#8592;</div>
    <div class="key" id="k_up" style="left:460px; top:48px;">&#8593;</div>
    <div class="key" id="k_right" style="left:590px; top:48px;">&#8594;</div>

    <div class="key" id="k_apply" style="left:330px; top:178px;"></div>
    <div class="key" id="k_down" style="left:460px; top:178px;">&#8595;</div>
    <div class="key" id="k_cancel" style="left:590px; top:178px;"></div>

    <div class="key-title" style="left:84px; top:350px;">Увеличить давление</div>
    <div class="key" id="k_start1" style="left:120px; top:405px;"></div>

    <div class="key-title" style="left:290px; top:350px;">Уменьшить давление</div>
    <div class="key" id="k_stop1" style="left:330px; top:405px;"></div>

    <div class="key large" id="k_emergency" style="left:530px; top:382px;">
    STOP
	</div>
  </div>
</div>

<script>
const KEY_BINDINGS = [
  { bit: 0, id: 'k_right' },
  { bit: 1, id: 'k_up' },
  { bit: 2, id: 'k_down' },
  { bit: 3, id: 'k_left' },
  { bit: 4, id: 'k_cancel' },
  { bit: 9, id: 'k_start1' },
  { bit: 11, id: 'k_stop1' },
  { bit: 12, id: 'k_apply' },
  { bit: 13, id: 'k_emergency' }
];

const STM_KEY_NAMES = {
  0: 'key_right',
  1: 'key_up',
  2: 'key_down',
  3: 'key_left',
  4: 'key_cancel',
  9: 'key_start1',
  11: 'key_stop1',
  12: 'key_apply',
  13: 'key_emergency_stop'
};

const keysByBit = new Map(
  KEY_BINDINGS.map((binding) => [binding.bit, document.getElementById(binding.id)])
);

const statusEl = document.getElementById('status');
const pressedHistoryBits = new Set();
let hwMask = 0;
let manualMask = 0;
let pollInFlight = false;
let pollTimer = null;

function logPressedKeys(previousMask, mask) {
  const pressedMask = mask & (~previousMask);
  if (pressedMask === 0) {
    return;
  }

  for (let bit = 0; bit < 16; bit++) {
    if (((pressedMask >> bit) & 1) === 1) {
      pressedHistoryBits.add(bit);
      const keyName = STM_KEY_NAMES[bit] || `bit_${bit}`;
      console.log(`[STM] key pressed: ${keyName} (bit ${bit})`);
    }
  }
}

function renderMask(mask) {
  for (const [bit, el] of keysByBit) {
    if (!el) continue;
    const active = ((mask >> bit) & 1) === 1;
    el.classList.toggle('active', active);
    el.classList.toggle('pressed-history', pressedHistoryBits.has(bit));
  }

  statusEl.textContent = `mask: ${mask.toString(16).toUpperCase().padStart(4, '0')}`;
}

function renderCurrentMask() {
  renderMask(hwMask | manualMask);
}

function bindLocalInteraction() {
  for (const [bit, el] of keysByBit) {
    if (!el) continue;

    const release = () => {
      manualMask &= ~(1 << bit);
      renderCurrentMask();
    };

    el.addEventListener('pointerdown', (event) => {
      event.preventDefault();
      pressedHistoryBits.add(bit);
      manualMask |= (1 << bit);
      if (el.setPointerCapture) {
        el.setPointerCapture(event.pointerId);
      }
      renderCurrentMask();
    });

    el.addEventListener('pointerup', release);
    el.addEventListener('pointercancel', release);
    el.addEventListener('lostpointercapture', release);
  }
}

async function pollKeyboardState() {
  if (pollInFlight) {
    return;
  }

  pollInFlight = true;
  try {
    const response = await fetch('/keyboard_state.json', { cache: 'no-store' });
    const json = await response.json();
    const mask = parseInt(json.m, 16);
    if (!Number.isNaN(mask) && mask !== hwMask) {
      logPressedKeys(hwMask, mask);
      hwMask = mask;
      renderCurrentMask();
    }
  } catch (error) {
    console.log('keyboard state request error:', error.name);
  } finally {
    pollInFlight = false;
    pollTimer = setTimeout(pollKeyboardState, 300);
  }
}

bindLocalInteraction();
renderCurrentMask();
pollKeyboardState();
</script>
</body>
</html>
