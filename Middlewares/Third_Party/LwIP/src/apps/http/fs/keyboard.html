<!DOCTYPE html>
<html lang="ru">
<head>
<link rel="icon" href="data:;base64,iVBORw0KGgo=">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тест клавиатуры</title>
<style>
body { width:1280px; margin:auto; font-family: Arial, sans-serif; }
.panel {
  position: relative;
  width: 1200px;
  height: 700px;
  margin: 20px auto;
  background: #efefef;
  border-radius: 10px;
}
.key {
  position: absolute;
  width: 102px;
  height: 102px;
  border-radius: 50%;
  border: 2px solid #bdbdbd;
  background: #d0d0d0;
  color: #202020;
  font-size: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  user-select: none;
  transition: background-color .08s ease, border-color .08s ease;
}
.key.large { width: 170px; height: 170px; }
.key.active { background: #42b15d; border-color: #2f8d45; color: #fff; }
.key.pressed-history { background: #dff1ff; border-color: #9ec8ea; }
.key.pressed-history-striped {
  background: repeating-linear-gradient(
    -45deg,
    #dff1ff 0 10px,
    #dff1ff 10px 20px,
    #ffffff 20px 30px,
    #ffffff 30px 40px
  );
  border-color: #9ec8ea;
}
.key.active.pressed-history,
.key.active.pressed-history-striped { background: #42b15d; border-color: #2f8d45; color: #fff; }
.knob-line {
  width: 2px;
  height: 46px;
  background: #303030;
  border-radius: 2px;
  transform-origin: center center;
  transition: transform .08s ease;
}
.knob-left .knob-line { transform: rotate(-45deg); }
.knob-right .knob-line { transform: rotate(45deg); }
.knob-center .knob-line { transform: rotate(0deg); }
.topbar { display:flex; justify-content:space-between; align-items:center; margin: 18px 40px 0; }
button { padding: 8px 14px; font-size: 16px; cursor: pointer; }
.status { font-family: monospace; }
.key-title {
  position: absolute;
  width: 140px;
  text-align: center;
  font-size: 20px;
  color: #303030;
  font-weight: 600;
  user-select: none;
}
.revision-group { display: none; }
.revision-group.active { display: block; }
.revision-toggle-wrap { display: flex; justify-content: center; margin-bottom: 25px; }
</style>
</head>
<body>
<div class="topbar">
  <button type="button" onclick="location.href='test.html'">← Назад</button>
  <h2>Тест клавиатуры</h2>
  <div class="status" id="status">mask: ----</div>
</div>

<div class="panel" id="keyboard_panel">
  <div class="key-title" style="left:11px; top:90px;">ОТМЕНИТЬ</div>
  <div class="key" id="k14" style="left:30px; top:130px;"></div>

  <div class="key-title" id="k15_title" style="left:11px; top:450px;">МЕСТНЫЙ</div>
  <div class="key knob knob-center" id="k15" style="left:30px; top:490px;">
    <span class="knob-line" id="k15_line"></span>
  </div>

  <div class="key" id="k1" style="left:495px; top:40px;">↑</div>
  <div class="key" id="k3" style="left:410px; top:140px;">←</div>
  <div class="key" id="k0" style="left:580px; top:140px;">→</div>
  <div class="key" id="k2" style="left:495px; top:240px;">↓</div>

  <div class="key-title" style="left:951px; top:90px;">ПРИМЕНИТЬ</div>
  <div class="key" id="k4" style="left:970px; top:130px;"></div>

  <div id="rev1_group" class="revision-group active">
    <div class="key-title" style="left:336px; top:450px;">ПУСК</div>
    <div class="key" id="k12_rev1" style="left:355px; top:490px;"></div>

    <div class="key-title" style="left:476px; top:450px;">СТОП</div>
    <div class="key" id="k9_rev1" style="left:495px; top:490px;"></div>

    <div class="key-title" style="left:616px; top:450px;">КВИТИР</div>
    <div class="key" id="k8_rev1" style="left:635px; top:490px;"></div>
  </div>

  <div id="rev2_group" class="revision-group">
    <div class="key-title" style="left:285px; top:360px;">ПУСК 1</div>
    <div class="key" id="k12_rev2" style="left:304px; top:400px;"></div>

    <div class="key-title" style="left:455px; top:360px;">ПУСК 2</div>
    <div class="key" id="k5_rev2" style="left:474px; top:400px;"></div>

    <div class="key-title" style="left:625px; top:360px;">ПУСК 3</div>
    <div class="key" id="k7_rev2" style="left:644px; top:400px;"></div>

    <div class="key-title" style="left:795px; top:360px;">КВИТИР.</div>
    <div class="key" id="k8_rev2" style="left:814px; top:400px;"></div>

    <div class="key" id="k9_rev2" style="left:304px; top:540px;"></div>
    <div class="key-title" style="left:285px; top:650px;">СТОП 1</div>

    <div class="key" id="k10_rev2" style="left:474px; top:540px;"></div>
    <div class="key-title" style="left:455px; top:650px;">СТОП 2</div>

    <div class="key" id="k11_rev2" style="left:644px; top:540px;"></div>
    <div class="key-title" style="left:625px; top:650px;">СТОП 3</div>
  </div>

  <div class="key large" id="k13" style="left:935px; top:430px;">STOP</div>
</div>

<div class="revision-toggle-wrap">
  <button type="button" id="revision_toggle_btn">У меня другая ревизия устройства</button>
</div>

<script>
const REVISION_MAPS = {
  1: [
    { bit: 0, id: 'k0' },
    { bit: 1, id: 'k1' },
    { bit: 2, id: 'k2' },
    { bit: 3, id: 'k3' },
    { bit: 4, id: 'k14' },
    { bit: 6, id: 'k8_rev1' },
    { bit: 9, id: 'k12_rev1' },
    { bit: 11, id: 'k9_rev1' },
    { bit: 12, id: 'k4' },
    { bit: 13, id: 'k13' }
  ],
  2: [
    { bit: 0, id: 'k0' },
    { bit: 1, id: 'k1' },
    { bit: 2, id: 'k2' },
    { bit: 3, id: 'k3' },
    { bit: 4, id: 'k14' },
    { bit: 5, id: 'k5_rev2' },
    { bit: 6, id: 'k8_rev2' },
    { bit: 7, id: 'k7_rev2' },
    { bit: 8, id: 'k11_rev2' },
    { bit: 9, id: 'k12_rev2' },
    { bit: 10, id: 'k10_rev2' },
    { bit: 11, id: 'k9_rev2' },
    { bit: 12, id: 'k4' },
    { bit: 13, id: 'k13' }
  ]
};

const STM_KEY_NAMES = {
  0: 'key_right',
  1: 'key_up',
  2: 'key_down',
  3: 'key_left',
  4: 'key_cancel',
  5: 'key_start2',
  6: 'key_ack',
  7: 'key_start3',
  8: 'key_stop3',
  9: 'key_start1',
  10: 'key_stop2',
  11: 'key_stop1',
  12: 'key_apply',
  13: 'key_emergency_stop',
  14: 'key_distance',
  15: 'key_repair'
};

const k15Knob = document.getElementById('k15');
const k15Title = document.getElementById('k15_title');
const revisionToggleBtn = document.getElementById('revision_toggle_btn');
const revisionGroups = {
  1: document.getElementById('rev1_group'),
  2: document.getElementById('rev2_group')
};

let currentRevision = 1;
let prevMask = -1;
const pressedHistoryBits = new Set();

function getActiveKeyMap() {
  return REVISION_MAPS[currentRevision] || REVISION_MAPS[1];
}

function getKeysByBit() {
  return new Map(getActiveKeyMap().map((x) => [x.bit, document.getElementById(x.id)]));
}

function clearAllKeyStates() {
  document.querySelectorAll('.key').forEach((el) => {
    el.classList.remove('active', 'pressed-history', 'pressed-history-striped');
  });
}

function switchRevision() {
  currentRevision = currentRevision === 1 ? 2 : 1;
  revisionGroups[1].classList.toggle('active', currentRevision === 1);
  revisionGroups[2].classList.toggle('active', currentRevision === 2);
  clearAllKeyStates();
  renderMask(prevMask < 0 ? 0 : prevMask);
  console.log(`[STM] Переключена ревизия клавиатуры: rev${currentRevision}`);
}

revisionToggleBtn.addEventListener('click', switchRevision);

function logPressedKeys(previousMask, mask) {
  const pressedMask = mask & (~previousMask);
  if (pressedMask === 0) {
    return;
  }

  for (let bit = 0; bit < 16; bit++) {
    if (((pressedMask >> bit) & 1) === 1) {
      pressedHistoryBits.add(bit);
      const keyName = STM_KEY_NAMES[bit] || `bit_${bit}`;
      console.log(`[STM] Нажата кнопка: ${keyName} (bit ${bit})`);
    }
  }
}

function renderMask(mask) {
  const keysByBit = getKeysByBit();

  for (const [bit, el] of keysByBit) {
    if (!el) continue;
    const active = ((mask >> bit) & 1) === 1;
    el.classList.toggle('active', active);
    el.classList.toggle('pressed-history', pressedHistoryBits.has(bit));
  }

  const leftActive = ((mask >> 14) & 1) === 1;
  const rightActive = ((mask >> 15) & 1) === 1;
  if (k15Knob) {
    const leftHistory = pressedHistoryBits.has(14);
    const rightHistory = pressedHistoryBits.has(15);
    const bothHistory = leftHistory && rightHistory;
    const singleHistory = leftHistory !== rightHistory;

    k15Knob.classList.toggle('active', leftActive || rightActive);
    k15Knob.classList.toggle('pressed-history', bothHistory);
    k15Knob.classList.toggle('pressed-history-striped', singleHistory);
    k15Knob.classList.toggle('knob-left', leftActive && !rightActive);
    k15Knob.classList.toggle('knob-right', rightActive && !leftActive);
    k15Knob.classList.toggle('knob-center', !(leftActive ^ rightActive));
  }

  if (k15Title) {
    if (leftActive && !rightActive) {
      k15Title.textContent = 'ДИСТАНЦИОННЫЙ';
    } else if (rightActive && !leftActive) {
      k15Title.textContent = 'РЕМОНТ';
    } else {
      k15Title.textContent = 'МЕСТНЫЙ';
    }
  }

  document.getElementById('status').textContent = `mask: ${mask.toString(16).toUpperCase().padStart(4, '0')}`;
}

let pollInFlight = false;
let pollTimer = null;

async function pollKeyboardState() {
  if (pollInFlight) {
    return;
  }

  pollInFlight = true;
  try {
    const response = await fetch('/keyboard_state.json', { cache: 'no-store' });
    const json = await response.json();
    const mask = parseInt(json.m, 16);
    if (!Number.isNaN(mask) && mask !== prevMask) {
      const lastMask = prevMask < 0 ? 0 : prevMask;
      logPressedKeys(lastMask, mask);
      prevMask = mask;
      renderMask(mask);
    }
  } catch (error) {
    console.log('Ошибка запроса состояния клавиатуры:', error.name);
  } finally {
    pollInFlight = false;
    pollTimer = setTimeout(pollKeyboardState, 300);
  }
}

pollKeyboardState();
</script>
</body>
</html>
